@if (auth.isLoggedIn()) {
  <header class="topbar">
    <span class="brand">
      <app-logo class="logo" [size]="26" />
      <span class="brand-name">Madplan</span>
    </span>
    <span class="grow"></span>
    @if (auth.householdName()) { <span class="household">{{ auth.householdName() }}</span> }
    <a routerLink="/hjaelp" class="help-link" title="Hjælp &amp; FAQ" aria-label="Hjælp og FAQ">?</a>
    <button class="ghost small" (click)="auth.logout()" aria-label="Log ud">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <path d="m16 17 5-5-5-5" />
        <path d="M21 12H9" />
      </svg>
      Log ud
    </button>
  </header>
}

<main class="app-main">
  <router-outlet />

  <footer class="app-footer">
    <a routerLink="/privatliv">Privatlivspolitik</a>
    <span aria-hidden="true">·</span>
    <a routerLink="/handelsbetingelser">Handelsbetingelser</a>
  </footer>
</main>

@if (auth.isLoggedIn()) {
  <nav class="bottom-nav">
    <a routerLink="/uge" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4.5" width="18" height="16" rx="2.5" />
          <path d="M3 9.5h18" />
          <path d="M8 2.5v4M16 2.5v4" />
        </svg>
      </span><span class="lbl">Uge</span>
    </a>
    <a routerLink="/indkob" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="20" r="1.4" />
          <circle cx="18" cy="20" r="1.4" />
          <path d="M2.5 3h2.1l2.5 12.1a1.6 1.6 0 0 0 1.57 1.28h8.4a1.6 1.6 0 0 0 1.56-1.24L21.5 7H5.3" />
        </svg>
      </span><span class="lbl">Indkøb</span>
    </a>
    <a routerLink="/retter" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 3v6a2 2 0 0 0 2 2 2 2 0 0 0 2-2V3" />
          <path d="M6 11v10" />
          <path d="M19 15V3a4.5 4.5 0 0 0-4 4.5V12a1.5 1.5 0 0 0 1.5 1.5H19Zm0 0v6" />
        </svg>
      </span><span class="lbl">Retter</span>
    </a>
    <a routerLink="/lager" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M5 4.5h14v3.4H5Z" />
          <path d="M6.2 7.9h11.6v11.6a1.6 1.6 0 0 1-1.6 1.6H7.8a1.6 1.6 0 0 1-1.6-1.6Z" />
          <path d="M9.5 12h5" />
        </svg>
      </span><span class="lbl">Lager</span>
    </a>
    <a routerLink="/hjem" routerLinkActive="active" class="has-badge">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.6 12 3.2l9 7.4" />
          <path d="M5 9.4V20a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V9.4" />
          <path d="M9.5 21v-6h5v6" />
        </svg>
      </span><span class="lbl">Hjem</span>
      @if (tasks.attention() > 0) { <span class="nav-badge">{{ tasks.attention() }}</span> }
    </a>
    <a routerLink="/varegrupper" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2.5 21.4 6.7a1 1 0 0 1 0 1.83L12 12.7 2.6 8.53a1 1 0 0 1 0-1.83Z" />
          <path d="m2.6 13 9.4 4.2 9.4-4.2" />
          <path d="m2.6 17.4 9.4 4.2 9.4-4.2" />
        </svg>
      </span><span class="lbl">Grupper</span>
    </a>
    <a routerLink="/varer" routerLinkActive="active">
      <span class="ic">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12.6 2.6H4a1.4 1.4 0 0 0-1.4 1.4v8.6a1.4 1.4 0 0 0 .4 1L11.3 23a1.7 1.7 0 0 0 2.4 0l6.6-6.6a1.7 1.7 0 0 0 0-2.4L13.6 3a1.4 1.4 0 0 0-1-.4Z" />
          <circle cx="7.6" cy="7.6" r="1.3" />
        </svg>
      </span><span class="lbl">Varer</span>
    </a>
  </nav>
}

<app-toast-host />
