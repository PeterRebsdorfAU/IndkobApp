# Render Blueprint: opretter både backend-API (Docker) og frontend (statisk side)
# i ét klik. Databasen ligger separat på Neon (sættes som hemmelig env-var nedenfor).
#
# Brug: Render Dashboard -> New -> Blueprint -> peg på dette repo.
# Bagefter indsættes Neon-connection string under ConnectionStrings__Default.

services:
  # ---------- Backend-API (.NET 10, Docker) ----------
  - type: web
    name: indkobapp-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: apps/meal-shopping/Dockerfile
    dockerContext: apps/meal-shopping
    healthCheckPath: /api/categories
    envVars:
      # Neon PostgreSQL connection string (.NET/Npgsql-format). Hemmelig -> sættes i dashboardet.
      - key: ConnectionStrings__Default
        sync: false
      # JWT-signeringsnøgle. Render genererer en stærk tilfældig værdi automatisk.
      - key: Jwt__Key
        generateValue: true
      # Admin-nøgle til at oprette/slette husstande (header X-Admin-Key). Render genererer den;
      # find værdien i Render-dashboardet når du skal oprette en husstand.
      - key: Admin__Key
        generateValue: true

  # ---------- Frontend (Angular PWA, statisk) ----------
  - type: web
    name: indkobapp-web
    runtime: static
    plan: free
    rootDir: apps/meal-shopping/frontend/indkobs-app
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/indkobs-app/browser
    # SPA-fallback: alle ruter serveres af index.html (Angular router håndterer resten)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
